name: Notify Fork to Sync

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync on fork
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.SYNC_TOKEN }}" \
            https://api.github.com/repos/Kamkmgamer/In-Case-No-One-Asked/dispatches \
            -d '{"event_type":"sync-trigger"}'
