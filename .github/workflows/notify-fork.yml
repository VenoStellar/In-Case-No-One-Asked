name: Notify Fork to Sync

on:
  push:
    branches: [main]

jobs:
  notify:
    if: github.repository == 'VenoStellar/In-Case-No-One-Asked'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync on fork
        run: |
          curl --fail-with-body -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Authorization: Bearer ${{ secrets.SYNC_TOKEN }}" \
            https://api.github.com/repos/Kamkmgamer/In-Case-No-One-Asked/dispatches \
            -d '{"event_type":"sync-trigger"}'
