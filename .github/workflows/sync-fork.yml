name: Sync Fork

on:
  repository_dispatch:
    types: [sync-trigger]
  workflow_dispatch:

jobs:
  sync:
    if: github.repository == 'Kamkmgamer/In-Case-No-One-Asked'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Sync from upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/VenoStellar/In-Case-No-One-Asked.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit --no-commit
          git checkout HEAD -- .github/workflows/
          git commit -m "Sync with upstream (excluding workflow files)"
          git push origin main
